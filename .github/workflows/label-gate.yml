name: Label Gate

on:
  # Runs immediately when a label is manually added/removed or a PR is reopened.
  # opened/synchronize are intentionally omitted: those events race with Classify PR
  # (which adds the semver label). label-gate re-runs after Classify PR completes
  # via the workflow_run trigger below.
  pull_request:
    types: [labeled, unlabeled, reopened]
  # Runs after Classify PR finishes so the semver label is already applied.
  # Events caused by GITHUB_TOKEN don't trigger other workflows (GitHub loop
  # prevention), so we can't rely on the "labeled" trigger when the label is
  # added programmatically by Classify PR.
  workflow_run:
    workflows: ["Classify PR"]
    types: [completed]

permissions:
  pull-requests: read
  checks: write

jobs:
  label-gate:
    name: label-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check semver label
        uses: actions/github-script@v9
        with:
          script: |
            const semverLabels = ['semver: major', 'semver: minor', 'semver: patch'];

            let prNumber;
            let headSha;

            if (context.eventName === 'workflow_run') {
              const run = context.payload.workflow_run;

              // For same-repo PRs, pull_requests is populated by GitHub.
              // Use pull_requests[0].head.sha -- not run.head_sha -- because
              // Classify PR uses pull_request_target which runs on the base
              // branch, so run.head_sha is the base-branch SHA, not the PR head.
              if (run.pull_requests && run.pull_requests.length > 0) {
                prNumber = run.pull_requests[0].number;
                headSha = run.pull_requests[0].head.sha;
              } else {
                // Fallback for fork PRs: head_sha is the base-branch SHA when
                // triggered by pull_request_target, so match by branch name +
                // source repo instead. Paginate to avoid missing PRs beyond 30.
                const prs = await github.paginate(github.rest.pulls.list, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                });
                const pr = prs.find(p =>
                  p.head.ref === run.head_branch &&
                  p.head.repo.full_name === run.head_repository.full_name
                );
                if (!pr) {
                  core.info(`No open PR found for branch ${run.head_branch}. Skipping.`);
                  return;
                }
                prNumber = pr.number;
                headSha = pr.head.sha;
              }
            } else {
              prNumber = context.issue.number;
            }

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const allLabelNames = labels.map(l => l.name);
            const hasSkipRelease = allLabelNames.includes('skip-release');
            const semverFound = semverLabels.filter(l => allLabelNames.includes(l));

            let passed = false;
            let message;

            if (semverFound.length > 1) {
              message = `PR has multiple semver labels (${semverFound.join(', ')}). Remove all but one.`;
            } else if (semverFound.length === 0) {
              message = 'PR must have exactly one semver label: semver: major, semver: minor, or semver: patch. skip-release may be added alongside but does not replace a semver label.';
            } else {
              const active = [...semverFound, ...(hasSkipRelease ? ['+ skip-release'] : [])];
              message = `PR labels OK: ${active.join(' ')}`;
              passed = true;
            }

            if (context.eventName === 'workflow_run') {
              // workflow_run jobs run in default-branch context, so GitHub's automatic
              // check run would land on the wrong commit. Create one explicitly on the
              // PR's head SHA so it counts toward the PR's required status checks.
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'label-gate',
                head_sha: headSha,
                status: 'completed',
                conclusion: passed ? 'success' : 'failure',
                output: {
                  title: passed ? 'Semver label OK' : 'Missing or invalid semver label',
                  summary: message,
                },
              });
            }

            if (passed) {
              core.info(message);
            } else {
              core.setFailed(message);
            }

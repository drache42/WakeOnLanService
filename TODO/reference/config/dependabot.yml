version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    groups:
      nuget-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
    target-branch: main
    groups:
      docker-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    groups:
      actions-non-major:
        update-types:
          - minor
          - patch

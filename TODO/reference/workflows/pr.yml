name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('TalkingPointsSummary.sln', 'Directory.Build.props', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore TalkingPointsSummary.sln

      - name: Build solution
        run: dotnet build TalkingPointsSummary.sln --configuration Release --no-restore

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: >-
          dotnet test tests/TalkingPointsSummary.Tests/TalkingPointsSummary.Tests.csproj
          --configuration Release
          --no-build
          --filter "Category!=Integration"
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory artifacts/test-results/unit

      - name: Run integration tests
        id: integration_tests
        continue-on-error: true
        run: >-
          dotnet test tests/TalkingPointsSummary.IntegrationTests/TalkingPointsSummary.IntegrationTests.csproj
          --configuration Release
          --no-build
          --filter "Category=Integration"
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory artifacts/test-results/integration

      - name: Publish test summary
        if: always()
        run: .github/scripts/publish-test-summary.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-test-results
          path: artifacts/test-results
          if-no-files-found: warn

      - name: Fail workflow on test errors
        if: always()
        env:
          UNIT_OUTCOME: ${{ steps.unit_tests.outcome }}
          INTEGRATION_OUTCOME: ${{ steps.integration_tests.outcome }}
        run: |
          if ($env:UNIT_OUTCOME -eq 'failure' -or $env:INTEGRATION_OUTCOME -eq 'failure') {
            throw 'One or more test suites failed.'
          }

  notify-discord:
    name: Notify Discord on trusted PR failures
    runs-on: ubuntu-latest
    needs:
      - validate
    if: ${{ always() && needs.validate.result == 'failure' && github.event.pull_request.head.repo.full_name == github.repository }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Post failure notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MESSAGE: |
            PR workflow failed.
            Repository: ${{ github.repository }}
            PR: #${{ github.event.pull_request.number }}
            Branch: ${{ github.head_ref }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: .github/scripts/notify-discord.ps1
